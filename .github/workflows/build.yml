name: Deploy Website

# ── Triggers ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  workflow_dispatch:

# ── Permissions (GitHub Pages deployment) ────────────────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

# ── Jobs ─────────────────────────────────────────────────────────────────────
# CI only publishes the website. The data export (cv build-site → site.json),
# the Scholar fetch, and the LaTeX CV compilation all happen OFFLINE — their
# outputs (website/src/data/site.json, website/public/cv/full.pdf, theme.css)
# are committed to the repo, so CI needs nothing but Node + npm.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm ci
        working-directory: website

      - name: Build Astro website
        run: npm run build
        working-directory: website

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
