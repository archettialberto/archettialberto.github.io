# Personal identity and contact details.
# This is the only place name/title/contacts live; both CVs and the website read it.

name: Alberto Archetti
# Suffix appended after the name where the design calls for it (e.g. "Alberto Archetti, Ph.D.").
suffix: Ph.D.
title: Postdoctoral Researcher in Artificial Intelligence

# Short tagline shown under the name on the website hero (one line).
tagline: Tabular foundation models · Federated learning · Survival analysis

# Short professional summary — used by the CV one-pager. Keep it tight (~3
# sentences) and jargon-light so the one-pager stays on a single page.
summary: >
  I am a postdoctoral researcher in artificial intelligence at AIRLab, Politecnico
  di Milano. My work spans tabular foundation models, federated learning, and
  survival analysis, with a focus on extracting reliable, privacy-preserving
  insights from sensitive and distributed healthcare data.

# First-person bio shown on the website (falls back to `summary` if empty).
# One paragraph per line so the browser wraps it naturally; inline <strong> tags
# highlight research interests (rendered as HTML on the site).
bio: |
  I am fascinated by emerging phenomena — how simple rules give rise to complex behavior, whether in vitro or in silico — and I find the field of artificial intelligence the ideal playground to study them.

  As a postdoctoral researcher at AIRLab, Politecnico di Milano, I work on <strong>tabular foundation models</strong>, <strong>federated learning</strong>, and <strong>survival analysis</strong>, building models that learn from sensitive, multimodal data — turning scattered information into reliable, trustworthy predictions. I also love teaching and mentoring, and I take part in educational initiatives to promote AI literacy at all levels.

# Contact entries. `label` is what the sidebar shows; `value` is plain text;
